<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
body {
  margin:0;
  background:#000;
}
video {
  width:100%;
  height:100vh;
  object-fit:cover;
}
</style>
</head>

<body>

<video id="player" autoplay controls playsinline></video>

<script>
// ambil id
const url = new URLSearchParams(window.location.search);
const id = url.get('id');

// load video
fetch('videos.json')
.then(res => res.json())
.then(data => {
  document.getElementById("player").src = data[id].file;
});

// DIRECT LINK IKLAN (UPDATE)
let clicked = false;
document.body.onclick = function() {
  if (!clicked) {
    clicked = true;
    window.open("https://omg10.com/4/10913553", "_blank");
  }
}
</script>

</body>
</html>
